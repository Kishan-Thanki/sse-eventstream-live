<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>SSE Live Stream</title>
    <link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>⚡</text></svg>">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
    <style>
      :root {
        --bg-color: #f8fafc;
        --card-bg: #ffffff;
        --text-primary: #0f172a;
        --text-secondary: #64748b;
        --accent: #2563eb;
        --border: #e2e8f0;
        --shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.05), 0 2px 4px -2px rgba(0, 0, 0, 0.05);
      }

      [data-theme="dark"] {
        --bg-color: #0f172a;
        --card-bg: #1e293b;
        --text-primary: #f8fafc;
        --text-secondary: #94a3b8;
        --accent: #38bdf8;
        --border: #334155;
        --shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.3), 0 4px 6px -4px rgba(0, 0, 0, 0.3);
      }

      * {
        box-sizing: border-box;
        margin: 0;
        padding: 0;
      }

      body {
        font-family: 'Inter', sans-serif;
        background-color: var(--bg-color);
        color: var(--text-primary);
        min-height: 100vh;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        padding: 2rem;
        transition: background-color 0.3s ease, color 0.3s ease;
      }

      .container {
        width: 100%;
        max-width: 600px;
        animation: slideUp 0.6s cubic-bezier(0.16, 1, 0.3, 1);
        position: relative;
      }

      .theme-toggle {
        position: absolute;
        top: 0;
        right: 0;
        background: none;
        border: none;
        color: var(--text-secondary);
        cursor: pointer;
        font-size: 1.2rem;
        padding: 0.5rem;
        border-radius: 50%;
        transition: color 0.2s, background-color 0.2s;
      }

      .theme-toggle:hover {
        color: var(--text-primary);
        background-color: rgba(128, 128, 128, 0.1);
      }

      .header {
        text-align: center;
        margin-bottom: 2rem;
      }

      h2 {
        font-size: 1.75rem;
        font-weight: 600;
        color: var(--text-primary);
        margin-bottom: 0.5rem;
      }

      .subtitle {
        color: var(--text-secondary);
        font-size: 0.95rem;
      }

      .card {
        background: var(--card-bg);
        border: 1px solid var(--border);
        border-radius: 16px;
        box-shadow: var(--shadow);
        padding: 2rem;
        position: relative;
        overflow: hidden;
      }

      .status-indicator {
        position: absolute;
        top: 1.5rem;
        right: 1.5rem;
        display: flex;
        align-items: center;
        gap: 0.5rem;
        font-size: 0.8rem;
        font-weight: 500;
        color: var(--text-secondary);
      }

      .dot {
        width: 8px;
        height: 8px;
        border-radius: 50%;
        background-color: #22c55e;
        box-shadow: 0 0 0 2px rgba(34, 197, 94, 0.2);
        animation: pulse 2s infinite;
      }

      .dot.disconnected {
        background-color: #ef4444;
        box-shadow: 0 0 0 2px rgba(239, 68, 68, 0.2);
        animation: none;
      }

      .refresh-btn {
        background: none;
        border: none;
        color: var(--accent);
        cursor: pointer;
        font-size: 1.1rem;
        padding: 0.2rem;
        margin-right: 0.5rem;
        transition: transform 0.2s;
      }

      .refresh-btn:hover {
        transform: rotate(45deg);
      }

      .stream-content {
        min-height: 120px;
        font-size: 1.1rem;
        line-height: 1.6;
        color: var(--text-primary);
        white-space: pre-wrap;
        margin-top: 1rem;
      }

      .cursor {
        display: inline-block;
        width: 2px;
        height: 1.1em;
        background-color: var(--accent);
        vertical-align: middle;
        animation: blink 1s step-end infinite;
        margin-left: 2px;
      }

      .error-msg {
        display: block;
        color: #ef4444;
        margin-top: 1.5rem;
        padding-top: 1rem;
        border-top: 1px dashed var(--border);
        font-size: 0.9rem;
      }

      @keyframes blink {
        0%, 100% { opacity: 1; }
        50% { opacity: 0; }
      }

      @keyframes pulse {
        0% { box-shadow: 0 0 0 0 rgba(34, 197, 94, 0.4); }
        70% { box-shadow: 0 0 0 6px rgba(34, 197, 94, 0); }
        100% { box-shadow: 0 0 0 0 rgba(34, 197, 94, 0); }
      }

      @keyframes slideUp {
        from { opacity: 0; transform: translateY(20px); }
        to { opacity: 1; transform: translateY(0); }
      }
    </style>
  </head>
  <body>
    <div class="container">
      <button class="theme-toggle" id="themeToggle" aria-label="Toggle theme">
        <span id="themeIcon">🌓</span>
      </button>

      <div class="header">
        <h2>Live Event Stream</h2>
        <p class="subtitle">Original Server-Sent Events Demo</p>
        <a href="/search-app" style="color: var(--accent); text-decoration: none; font-size: 0.9rem; margin-top: 10px; display: inline-block;">Try the new Search →</a>
      </div>

      <div class="card">
        <div class="status-indicator" id="status">
          <button class="refresh-btn" id="refreshBtn" aria-label="Restart Stream" title="Restart Stream">↻</button>
          <div class="dot" id="dot"></div>
          <span id="status-text">Connected</span>
        </div>
        
        <div class="stream-content" id="resp"><span class="cursor" id="cursor"></span></div>
      </div>
    </div>

    <script>
      const themeToggle = document.getElementById("themeToggle");
      const themeIcon = document.getElementById("themeIcon");

      const prefersDark = window.matchMedia("(prefers-color-scheme: dark)").matches;
      const storedTheme = localStorage.getItem("theme");
      let currentTheme = storedTheme || (prefersDark ? "dark" : "light");
      
      const applyTheme = (theme) => {
        if (theme === "dark") {
          document.documentElement.setAttribute("data-theme", "dark");
          themeIcon.innerText = "☀️";
        } else {
          document.documentElement.removeAttribute("data-theme");
          themeIcon.innerText = "🌙";
        }
      };

      applyTheme(currentTheme);

      themeToggle.addEventListener("click", () => {
        currentTheme = currentTheme === "dark" ? "light" : "dark";
        localStorage.setItem("theme", currentTheme);
        applyTheme(currentTheme);
      });

      let sse;
      const responseElement = document.getElementById("resp");
      const cursor = document.getElementById("cursor");
      const dot = document.getElementById("dot");
      const statusText = document.getElementById("status-text");
      const refreshBtn = document.getElementById("refreshBtn");

      function startStream() {
        if (sse) sse.close();
        
        Array.from(responseElement.childNodes).forEach(node => {
            if (node !== cursor) {
                responseElement.removeChild(node);
            }
        });

        const existingError = document.querySelector(".error-msg");
        if (existingError) existingError.remove();

        dot.className = "dot";
        statusText.innerText = "Connected";
        cursor.style.display = "inline-block";

        sse = new EventSource("/events");

        sse.onmessage = (event) => {
          const textNode = document.createTextNode(event.data + " ");
          responseElement.insertBefore(textNode, cursor);
        };

        sse.onerror = () => {
          sse.close();
          dot.className = "dot disconnected";
          statusText.innerText = "Disconnected";
          cursor.style.display = "none";

          const errorSpan = document.createElement("div");
          errorSpan.className = "error-msg";
          errorSpan.innerHTML = "Stream finished.";
          responseElement.appendChild(errorSpan);
        };
      }

      startStream();

      refreshBtn.addEventListener("click", startStream);
    </script>
  </body>
</html>
